<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EdgeOS Setup</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 480px;
      height: 520px;
      overflow: hidden;
      background: #f2f2f7;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #1c1c1e;
    }

    .container {
      padding: 36px 40px 32px;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header { margin-bottom: 28px; }

    .logo {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
    }
    .logo span { color: #007AFF; }

    .subtitle {
      margin-top: 4px;
      font-size: 13px;
      color: #8e8e93;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 14px;
      flex: 1;
    }

    .field { display: flex; flex-direction: column; gap: 5px; }

    label {
      font-size: 12px;
      font-weight: 600;
      color: #3c3c43;
      letter-spacing: 0.1px;
    }

    input[type="text"],
    input[type="password"] {
      height: 36px;
      padding: 0 12px;
      border: 1px solid rgba(60, 60, 67, 0.29);
      border-radius: 8px;
      background: #fff;
      font-size: 13px;
      font-family: inherit;
      color: #1c1c1e;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: #007AFF;
      box-shadow: 0 0 0 3px rgba(0, 122, 255, 0.18);
    }

    input::placeholder { color: #c7c7cc; }

    .password-wrapper { position: relative; }
    .password-wrapper input { width: 100%; padding-right: 40px; }

    .toggle-btn {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      color: #8e8e93;
    }
    .toggle-btn:hover { color: #3c3c43; }

    .helper {
      font-size: 11px;
      color: #8e8e93;
      margin-top: 1px;
    }

    .actions { margin-top: 6px; }

    #save-btn {
      width: 100%;
      height: 36px;
      background: #007AFF;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.12s;
      -webkit-appearance: none;
    }
    #save-btn:hover  { background: #0063e0; }
    #save-btn:active { background: #0051b8; }
    #save-btn:disabled { background: #b0c8f5; cursor: not-allowed; }

    #status-msg {
      display: none;
      margin-top: 10px;
      padding: 8px 12px;
      border-radius: 7px;
      font-size: 12.5px;
      line-height: 1.4;
    }
    #status-msg.success { display: block; background: rgba(52,199,89,0.12); color: #1a7f37; }
    #status-msg.error   { display: block; background: rgba(255,59,48,0.10); color: #c0392b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">Edge<span>OS</span></div>
      <div class="subtitle">Connect this device to your team</div>
    </div>

    <div class="form">
      <div class="field">
        <label for="cloud-url">Cloud URL</label>
        <input type="text" id="cloud-url" placeholder="wss://edgeos.sailoi.com" autocomplete="off" spellcheck="false" />
      </div>

      <div class="field">
        <label for="team-hash">Team Hash</label>
        <input type="text" id="team-hash" placeholder="from your EdgeOS team settings" autocomplete="off" spellcheck="false" />
      </div>

      <div class="field">
        <label for="api-token">API Token</label>
        <div class="password-wrapper">
          <input type="password" id="api-token" placeholder="from your EdgeOS profile" autocomplete="off" />
          <button class="toggle-btn" id="toggle-token" type="button" title="Show / hide token">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="helper">Generate a token at your EdgeOS profile → API Tokens</div>
      </div>
    </div>

    <div class="actions">
      <button id="save-btn">Save &amp; Connect</button>
      <div id="status-msg"></div>
    </div>
  </div>

  <script>
    const tokenInput = document.getElementById('api-token');
    document.getElementById('toggle-token').addEventListener('click', () => {
      tokenInput.type = tokenInput.type === 'password' ? 'text' : 'password';
    });

    document.getElementById('save-btn').addEventListener('click', async () => {
      const cloudUrl = document.getElementById('cloud-url').value.trim();
      const teamHash = document.getElementById('team-hash').value.trim();
      const apiToken = document.getElementById('api-token').value.trim();
      const btn      = document.getElementById('save-btn');
      const status   = document.getElementById('status-msg');

      if (!cloudUrl || !teamHash || !apiToken) {
        status.className = 'error';
        status.textContent = 'All fields are required.';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Saving…';
      status.className = '';
      status.style.display = 'none';

      try {
        await window.__TAURI__.core.invoke('save_config', { cloudUrl, teamHash, apiToken });
        status.className = 'success';
        status.textContent = '✓ Connected. The daemon will restart automatically.';
        btn.textContent = 'Saved';
      } catch (err) {
        status.className = 'error';
        status.textContent = err || 'Something went wrong. Check permissions and try again.';
        btn.disabled = false;
        btn.textContent = 'Save & Connect';
      }
    });
  </script>
</body>
</html>
