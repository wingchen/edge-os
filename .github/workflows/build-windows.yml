name: Build Windows Installer

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - windows-support
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      # ── Rust ──────────────────────────────────────────────────────────────────
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            edge -> target
            app/src-tauri -> target

      # ── Node / Tauri CLI ──────────────────────────────────────────────────────
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install npm dependencies
        run: npm ci
        working-directory: app

      # ── OpenSSL vendored build needs NASM ─────────────────────────────────────
      # The edge crate compiles OpenSSL from source (features = ["vendored"]).
      # NASM is not on windows-latest by default.
      - name: Install NASM
        run: choco install nasm -y
        shell: powershell

      # ── Build edge binary ─────────────────────────────────────────────────────
      # No GStreamer on Windows — all camera/streaming modules are cfg-gated.
      - name: Build edge binary (x64)
        run: cargo build --release --target x86_64-pc-windows-msvc
        working-directory: edge

      # ── Stage sidecar for Tauri ───────────────────────────────────────────────
      # Tauri looks for the sidecar at:
      #   edge/target/release/edge-os-edge-x86_64-pc-windows-msvc.exe
      - name: Stage sidecar
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path edge\target\release | Out-Null
          Copy-Item `
            edge\target\x86_64-pc-windows-msvc\release\edge-os-edge.exe `
            edge\target\release\edge-os-edge-x86_64-pc-windows-msvc.exe

      # ── Placeholder GStreamer dirs ────────────────────────────────────────────
      # tauri.conf.json references gstreamer/lib/** and gstreamer/plugins/**
      # as resources. On Windows these are empty; create the dirs so Tauri
      # doesn't error on a missing glob source.
      - name: Create placeholder GStreamer resource dirs
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path app\src-tauri\gstreamer\lib     | Out-Null
          New-Item -ItemType Directory -Force -Path app\src-tauri\gstreamer\plugins | Out-Null

      # ── Build Tauri NSIS installer ────────────────────────────────────────────
      - name: Build Tauri NSIS installer
        run: npm run build -- --target x86_64-pc-windows-msvc --bundles nsis
        working-directory: app

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload NSIS installer
        uses: actions/upload-artifact@v4
        with:
          name: EdgeOS-Windows-x64
          path: app/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          if-no-files-found: error
